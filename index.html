<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉山 Unicard 配置小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .esun-green { color: #009874; }
        .bg-esun-green { background-color: #009874; }
        .tab-active { border-bottom: 4px solid #009874 !important; color: #009874 !important; font-weight: 700; }
        
        /* 導覽列滾動優化 */
        .category-nav-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            background: white;
            border-bottom: 1px solid #edf2f7;
        }
        
        .category-nav-content {
            display: flex;
            flex-wrap: nowrap;
            padding: 0 16px;
        }

        .category-tab {
            flex: 0 0 auto;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .hide-scrollbar::-webkit-scrollbar { height: 4px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        input::-webkit-calendar-picker-indicator { opacity: 0; }
    </style>
</head>
<body class="pb-10">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-esun-green rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">Unicard 配置小幫手</h1>
                    <p class="text-[10px] text-gray-400 font-medium">配置比較：自選 vs 推薦 vs UP選</p>
                </div>
            </div>
            <button onclick="triggerMockData()" class="text-[11px] bg-esun-green text-white px-4 py-2 rounded-xl font-bold shadow-md hover:brightness-110 transition-all">
                <i class="fas fa-magic"></i> 模擬隨機消費 
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6 space-y-6">
        <!-- 核心收益比較板 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">您的自選配置收益</p>
                <div class="flex items-baseline gap-1 text-slate-700">
                    <p id="userPoints" class="text-4xl font-black">0</p>
                    <span class="text-sm font-bold">pt</span>
                </div>
                <div id="userSelectionTag" class="mt-2 inline-block px-2 py-0.5 bg-slate-100 text-[10px] text-slate-500 rounded-md font-bold">已選 0 家</div>
            </div>

            <div id="comparisonCard" class="bg-esun-green p-6 rounded-3xl shadow-xl shadow-green-100 relative overflow-hidden text-white flex flex-col justify-center">
                <div class="absolute -right-4 -bottom-4 text-white/10 text-7xl"><i class="fas fa-rocket"></i></div>
                <p class="text-[10px] text-white/80 font-bold uppercase mb-1">改用推薦配置可多賺</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-bold">+</span>
                    <p id="diffPoints" class="text-4xl font-black">0</p>
                    <span class="text-sm font-bold">pt</span>
                </div>
                <p class="text-[10px] mt-2 text-white/70">最佳化自選名單之潛在收益</p>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm relative overflow-hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">系統推薦最佳收益</p>
                <div class="flex items-baseline gap-1 text-esun-green">
                    <p id="optimizedPoints" class="text-4xl font-black">0</p>
                    <span class="text-sm font-bold">pt</span>
                </div>
                <div class="mt-2 inline-block px-2 py-0.5 bg-green-50 text-[10px] text-esun-green rounded-md font-bold">自動選取貢獻最高 8 家</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：輸入與完整清單 -->
            <div class="lg:col-span-7 space-y-6">
                <section class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6">
                    <h3 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-esun-green"></i>新增消費紀錄
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                        <div class="md:col-span-5 relative group">
                            <label class="text-[10px] font-bold text-gray-400 block mb-1 ml-1">店家名稱 / 通路</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i class="fas fa-search text-xs"></i></span>
                                <input id="storeName" type="text" list="storeDataList" placeholder="搜尋店家..." onclick="this.select()" class="w-full border-gray-100 bg-gray-50 rounded-2xl py-3 pl-10 pr-10 text-sm focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300"><i class="fas fa-chevron-down text-[10px]"></i></span>
                            </div>
                            <datalist id="storeDataList"></datalist>
                        </div>
                        <div class="md:col-span-4">
                            <label class="text-[10px] font-bold text-gray-400 block mb-1 ml-1">金額 (TWD)</label>
                            <input id="amount" type="number" placeholder="金額" class="w-full border-gray-100 bg-gray-50 rounded-2xl py-3 px-4 text-sm font-black focus:ring-2 focus:ring-green-500 outline-none">
                        </div>
                        <div class="md:col-span-3 flex items-end">
                            <button onclick="addTransaction()" class="w-full bg-gray-800 text-white py-3 rounded-2xl font-bold text-sm hover:bg-black transition-all">加入</button>
                        </div>
                    </div>
                </section>

                <div class="space-y-4">
                    <div class="flex items-center justify-between px-2">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-gray-700 text-sm flex items-center gap-2">
                                <i class="fas fa-receipt text-gray-400"></i>消費明細
                            </h3>
                            <span id="recordCount" class="text-[10px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-bold">共 0 筆資料</span>
                        </div>
                        <button onclick="clearAllData()" class="text-[10px] text-red-500 font-bold px-3 py-1.5 bg-red-50 rounded-lg border border-red-100">清除全部</button>
                    </div>
                    <!-- 優化滾動顯示 -->
                    <div id="historyList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>

            <!-- 右側：配置明細 -->
            <div class="lg:col-span-5 space-y-4">
                <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 sticky top-24">
                    <div class="flex items-center justify-between mb-5 border-b pb-3">
                        <h3 class="text-sm font-bold text-gray-700">配置對比明細</h3>
                        <button onclick="openModal()" class="text-[10px] text-esun-green font-bold px-3 py-1 bg-green-50 rounded-full border border-green-100">
                            修改自選名單 <i class="fas fa-cog"></i>
                        </button>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 mb-3 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-slate-300"></span> 您的自選 8 大 (當前配置)
                            </p>
                            <div id="userActiveList" class="grid grid-cols-1 gap-2"></div>
                        </div>

                        <div class="pt-4 border-t border-dashed">
                            <p class="text-[10px] font-bold text-esun-green mb-3 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-esun-green"></span> 系統推薦 8 大 (最佳獲利)
                            </p>
                            <div id="optimizedActiveList" class="grid grid-cols-1 gap-2 opacity-80"></div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t">
                        <div class="flex items-center justify-between mb-3">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">UP 選方案升級試算</p>
                            <span class="text-[10px] bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full font-bold">月費 149pt</span>
                        </div>
                        <div id="upSuggestion" class="text-xs mb-3 font-bold p-3 rounded-2xl border transition-all"></div>
                        <div class="flex justify-between text-[11px] px-1">
                            <span class="text-gray-500">UP 選淨收益 (扣月費)</span>
                            <span id="upNetPoints" class="font-bold text-gray-700">0 pt</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: 配置選擇 -->
    <div id="selectionModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden relative shadow-2xl flex flex-col h-[85vh] max-h-[700px]">
            <div class="p-6 md:p-8 border-b bg-white flex justify-between items-start shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">自選您的 8 大特店</h2>
                    <p class="text-xs text-gray-400 mt-1">基礎 1% + 加碼 2.5% = 3.5% (上限 1000pt)</p>
                </div>
                <div class="bg-esun-green/10 text-esun-green px-4 py-2 rounded-2xl text-xs font-black">
                    已選 <span id="modalCounter">0</span> / 8
                </div>
            </div>

            <!-- 修正後的導覽列 -->
            <div class="category-nav-container hide-scrollbar">
                <div class="category-nav-content">
                    <button onclick="setCategory('all')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="all">全部</button>
                    <button onclick="setCategory('oversea')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="oversea">國外實體</button>
                    <button onclick="setCategory('others')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="others">精選商家</button>
                    <button onclick="setCategory('pay')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="pay">行動支付</button>
                    <button onclick="setCategory('traffic')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="traffic">交通加油</button>
                    <button onclick="setCategory('esg')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="esg">ESG消費</button>
                    <button onclick="setCategory('deptstore')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="deptstore">國內百貨</button>
                    <button onclick="setCategory('restaurant')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="restaurant">餐飲美食</button>
                    <button onclick="setCategory('travel')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="travel">旅遊航空</button>
                    <button onclick="setCategory('lifestyle')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="lifestyle">量販生活</button>
                    <button onclick="setCategory('platform')" class="category-tab px-5 py-4 text-sm font-bold border-b-4 border-transparent" data-cat="platform">電商平台</button>
                </div>
            </div>
            
            <div class="p-6 overflow-y-auto bg-gray-50 flex-1 space-y-4 custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="modalItemsList"></div>
            </div>

            <div class="p-6 md:p-8 border-t bg-white flex items-center justify-between">
                <button onclick="autoApplyRecommendation()" class="text-esun-green font-bold text-xs hover:underline">
                    <i class="fas fa-magic"></i> 一鍵套用推薦名單
                </button>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="px-5 py-3 rounded-2xl text-sm font-bold text-gray-400 hover:bg-gray-100">取消</button>
                    <button onclick="saveSelection()" class="bg-esun-green text-white px-8 py-3 rounded-2xl text-sm font-black shadow-xl">確認套用自選</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-8 py-4 rounded-2xl text-sm font-bold opacity-0 pointer-events-none transition-all duration-300 z-[300] shadow-2xl"></div>

    <script>
        const PROMOTION_INFO = {
            "categories": [
                { "id": "pay", "name": "行動支付", "merchants": ["玉山Wallet電子支付", "LINE Pay", "全支付", "街口支付", "悠遊付", "全盈+PAY", "iPASS MONEY", "icash Pay"] },
                { "id": "platform", "name": "電商平台", "merchants": ["momo購物網", "蝦皮購物", "淘寶網", "Coupang酷澎"] },
                { "id": "deptstore", "name": "國內百貨", "merchants": ["新光三越百貨", "台北101", "華泰名品城", "三井OUTLET", "京站", "美麗華", "秀泰生活", "LaLaport", "統領廣場", "采盟", "昇恆昌", "統一時代百貨台北店", "遠東百貨集團(含遠東SOGO、遠東Garden City(大巨蛋)及遠東百貨)", "漢神百貨(不含漢神巨蛋)、台中漢神洲際購物廣場", "微風百貨", "誠品生活"] },
                { "id": "lifestyle", "name": "生活採買", "merchants": ["家樂福", "屈臣氏", "康是美", "特力屋", "HOLA", "hoi好好生活", "UNIQLO", "NET", "大樹藥局", "丁丁藥妝"] },
                { "id": "restaurant", "name": "餐飲美食", "merchants": ["Uber Eats", "foodpanda", "EZTABLE", "王品瘋Pay", "饗賓餐飲", "瓦城料理", "乾杯燒肉", "漢來美食", "鼎王餐飲", "爭鮮餐飲"] },
                { "id": "traffic", "name": "加油交通", "merchants": ["台灣中油（限直營店）", "55688", "台鐵", "高鐵", "Uber", "Yoxi"] },
                { "id": "travel", "name": "航空旅遊", "merchants": ["中華航空", "長榮航空", "日本航空", "台灣虎航", "樂桃航空", "酷航", "Trip.com", "Booking.com", "Hotels.com", "AsiaYo", "Expedia", "KKday", "Klook", "雄獅旅遊", "可樂旅遊", "東南旅遊", "Agoda"] },
                { "id": "oversea", "name": "國外實體", "merchants": ["日本", "韓國", "泰國", "越南", "新加坡", "馬來西亞", "菲律賓", "中國", "香港", "澳門", "美國", "加拿大", "英國", "法國", "德國", "義大利", "澳洲"] },
                { "id": "others", "name": "精選商家", "merchants": ["Apple直營店", "小米台灣", "全國電子", "燦坤", "迪卡儂"] },
                { "id": "esg", "name": "ESG消費", "merchants": ["玉山Wallet愛心捐款", "特斯拉", "Gogoro電池資費", "YouBike 2.0"] }
            ]
        };

        const LIMIT_ANY = 1000;
        const LIMIT_UP = 5000;

        let transactions = [];
        let currentSelectedMerchants = new Set();
        let tempSelectedMerchants = new Set();
        let optimizedMerchants = new Set();
        const allMerchantNames = PROMOTION_INFO.categories.flatMap(c => c.merchants);

        function init() {
            const datalist = document.getElementById('storeDataList');
            allMerchantNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                datalist.appendChild(opt);
            });

            // 隨機選擇 8 個店家作為初始配置
            const shuffled = [...allMerchantNames].sort(() => 0.5 - Math.random());
            currentSelectedMerchants = new Set(shuffled.slice(0, 8));

            triggerMockData();
        }

        function triggerMockData() {
		    clearAllData();
            const mock = [];
            const now = Date.now();
            for (let i = 0; i < 30; i++) {
                const randomStore = allMerchantNames[Math.floor(Math.random() * allMerchantNames.length)];
                const randomAmount = Math.floor(Math.random() * 6000) + 100;
                mock.push({ id: now + i, store: randomStore, amount: randomAmount });
            }
            // 每次模擬都疊加而非重設，方便測試大量資料顯示
            transactions = [...transactions, ...mock];
            calculateOptimization(); 
            updateUI();
            //showToast("模擬資料已增加");
        }

        function calculateOptimization() {
            const stats = {};
            transactions.forEach(t => stats[t.store] = (stats[t.store] || 0) + t.amount);
            const sorted = Object.entries(stats)
                .filter(([name]) => allMerchantNames.includes(name))
                .sort((a,b) => b[1] - a[1])
                .slice(0, 8);
            optimizedMerchants = new Set(sorted.map(s => s[0]));
        }

        function calculatePoints(merchantSet, isUpPlan = false) {
            let basic = 0;
            let bonus = 0;
            const limit = isUpPlan ? LIMIT_UP : LIMIT_ANY;
            transactions.forEach(t => {
                basic += t.amount * 0.01;
                if (isUpPlan) {
                    if (allMerchantNames.includes(t.store)) bonus += t.amount * 0.035;
                } else {
                    if (merchantSet && merchantSet.has(t.store)) bonus += t.amount * 0.025;
                }
            });
            return Math.floor(basic + Math.min(bonus, limit));
        }

        function updateUI() {
            const userTotal = calculatePoints(currentSelectedMerchants);
            const optimizedTotal = calculatePoints(optimizedMerchants);
            const upTotalNet = calculatePoints(null, true) - 149;
            const diff = Math.max(0, optimizedTotal - userTotal);

            document.getElementById('userPoints').innerText = userTotal.toLocaleString();
            document.getElementById('optimizedPoints').innerText = optimizedTotal.toLocaleString();
            document.getElementById('diffPoints').innerText = diff.toLocaleString();
            document.getElementById('upNetPoints').innerText = `${upTotalNet.toLocaleString()} pt`;
            document.getElementById('userSelectionTag').innerText = `已選 ${currentSelectedMerchants.size} 家`;
            document.getElementById('recordCount').innerText = `共 ${transactions.length} 筆資料`;

            const upSug = document.getElementById('upSuggestion');
            const currentBestAny = Math.max(userTotal, optimizedTotal);
            if (upTotalNet > currentBestAny) {
                upSug.className = "text-xs mb-3 font-bold p-3 rounded-2xl border bg-purple-50 border-purple-200 text-purple-600";
                upSug.innerHTML = `<i class="fas fa-arrow-up"></i> 建議升級 UP 選方案，比目前多賺 ${Math.floor(upTotalNet - userTotal)} pt`;
            } else {
                upSug.className = "text-xs mb-3 font-bold p-3 rounded-2xl border bg-gray-50 border-gray-100 text-gray-400";
                upSug.innerHTML = `<i class="fas fa-check"></i> 維持目前任意選配置即可`;
            }

            const listEl = document.getElementById('historyList');
            if (transactions.length === 0) {
                listEl.innerHTML = '<div class="text-center py-20 text-gray-300 italic">尚無紀錄</div>';
            } else {
                // 完整顯示所有紀錄，並將最新的排在最前面
                listEl.innerHTML = transactions.slice().reverse().map(t => {
                    const inUser = currentSelectedMerchants.has(t.store);
                    const inOpt = optimizedMerchants.has(t.store);
                    return `
                    <div class="bg-white p-4 rounded-2xl border border-gray-50 flex justify-between items-center group transition-all">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg flex items-center justify-center ${inUser ? 'bg-orange-500 text-white shadow-lg shadow-orange-100' : 'bg-gray-100 text-gray-400'}">
                                <i class="fas ${inUser ? 'fa-check' : 'fa-receipt'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">${t.store}</p>
                                <div class="flex gap-1 mt-0.5">
                                    ${inUser ? '<span class="text-[8px] bg-slate-100 px-1 rounded text-slate-500">自選加碼中</span>' : ''}
                                    ${inOpt && !inUser ? '<span class="text-[8px] bg-green-50 px-1 rounded text-esun-green">推薦配置包含此項</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <p class="text-sm font-black text-gray-800">$${t.amount.toLocaleString()}</p>
                    </div>`;
                }).join('');
            }

            const stats = {};
            transactions.forEach(t => stats[t.store] = (stats[t.store] || 0) + t.amount);

            const renderDetailList = (set, elId, colorClass) => {
                const list = Array.from(set).map(m => ({ name: m, amount: stats[m] || 0 })).sort((a,b) => b.amount - a.amount);
                document.getElementById(elId).innerHTML = list.length > 0 ? list.map(item => `
                    <div class="flex items-center justify-between p-2.5 rounded-xl bg-gray-50/50 border border-gray-100">
                        <span class="text-[11px] font-bold text-gray-600 truncate mr-2">${item.name}</span>
                        <span class="text-[10px] font-black shrink-0 ${colorClass}">+$${Math.floor(item.amount * 0.025).toLocaleString()}</span>
                    </div>
                `).join('') : '<div class="text-[10px] text-gray-300 italic px-2">尚未選擇</div>';
            };

            renderDetailList(currentSelectedMerchants, 'userActiveList', 'text-slate-500');
            renderDetailList(optimizedMerchants, 'optimizedActiveList', 'text-esun-green');
        }

        function addTransaction() {
            const store = document.getElementById('storeName').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            if (!store || isNaN(amount) || amount <= 0) return;
            transactions.push({ id: Date.now(), store, amount });
            calculateOptimization();
            updateUI();
            document.getElementById('storeName').value = '';
            document.getElementById('amount').value = '';
            showToast("紀錄已新增");
        }

        function openModal() {
            tempSelectedMerchants = new Set(currentSelectedMerchants);
            setCategory('all');
            document.getElementById('selectionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('selectionModal').classList.add('hidden'); }

        function setCategory(cat) {
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.toggle('tab-active', btn.dataset.cat === cat));
            renderModalItems(cat);
        }

        function renderModalItems(cat) {
            const stats = {};
            transactions.forEach(t => stats[t.store] = (stats[t.store] || 0) + t.amount);
            
            let pool = [];
            if (cat === 'all') {
                pool = Array.from(new Set(PROMOTION_INFO.categories.flatMap(c => c.merchants)));
            } else {
                const found = PROMOTION_INFO.categories.find(c => c.id === cat);
                if (found) pool = found.merchants;
            }

            document.getElementById('modalItemsList').innerHTML = pool.map(name => {
                const isSelected = tempSelectedMerchants.has(name);
                const isRecommended = optimizedMerchants.has(name);
                return `
                <div onclick="toggleTempSelection('${name}', '${cat}')" class="p-4 rounded-3xl border-2 cursor-pointer transition-all flex justify-between items-center ${isSelected ? 'border-esun-green bg-green-50' : 'border-white bg-white hover:border-gray-100'}">
                    <div class="flex items-center gap-3">
                        <div class="w-6 h-6 rounded-xl border-2 flex items-center justify-center ${isSelected ? 'bg-esun-green border-esun-green text-white' : 'border-gray-100 text-transparent'}">
                            <i class="fas fa-check text-[10px]"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-700 leading-tight">${name}</p>
                            ${isRecommended ? '<span class="text-[9px] text-esun-green font-bold"><i class="fas fa-star text-[8px]"></i> 推薦選取</span>' : '<span class="text-[9px] text-gray-300">非當前主力</span>'}
                        </div>
                    </div>
                    <div class="text-xs font-black text-gray-800">$${(stats[name] || 0).toLocaleString()}</div>
                </div>`;
            }).join('');
            document.getElementById('modalCounter').innerText = tempSelectedMerchants.size;
        }

        function toggleTempSelection(name, cat) {
            if (tempSelectedMerchants.has(name)) {
                tempSelectedMerchants.delete(name);
            } else if (tempSelectedMerchants.size < 8) {
                tempSelectedMerchants.add(name);
            } else {
                showToast("自選上限為 8 家");
            }
            renderModalItems(cat);
        }

        function autoApplyRecommendation() {
            tempSelectedMerchants = new Set(optimizedMerchants);
            const currentTab = document.querySelector('.category-tab.tab-active');
            const currentCat = currentTab ? currentTab.dataset.cat : 'all';
            renderModalItems(currentCat);
            showToast("已勾選推薦名單");
        }

        function saveSelection() {
            currentSelectedMerchants = new Set(tempSelectedMerchants);
            updateUI();
            closeModal();
            showToast("自選配置已套用");
        }

        function clearAllData() {
            transactions = [];
            calculateOptimization();
            updateUI();
            showToast("所有資料已清除");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1'; t.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
