<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉山 Unicard 3.5% 任意選助手 (最新官方版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .esun-green { color: #009874; }
        .bg-esun-green { background-color: #009874; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-esun-green rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-credit-card"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">Unicard 3.5% 助手</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden md:block text-right">
                    <p class="text-[10px] text-gray-400">當前方案</p>
                    <p class="text-xs font-bold text-esun-green">訂製方案 (任意選 8 家)</p>
                </div>
                <button onclick="initMockData()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-xl text-sm font-bold transition-colors">
                    <i class="fas fa-sync-alt mr-1"></i> 刷新 200 筆模擬
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-500 mb-1">預估 e point</p>
                <p id="totalPoints" class="text-2xl font-bold text-esun-green">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow">
                <p class="text-xs text-gray-500 mb-1">總消費金額</p>
                <p id="totalSpend" class="text-2xl font-bold text-gray-800">$0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 card-shadow col-span-2">
                <p class="text-xs text-gray-500 mb-1 text-orange-600 font-bold italic">最佳效益優化 (已選 8 家排序)</p>
                <div class="flex items-center gap-2 mt-1">
                    <div class="flex-1 bg-gray-100 h-2 rounded-full overflow-hidden">
                        <div id="selectionProgress" class="bg-orange-400 h-full w-0 transition-all duration-500"></div>
                    </div>
                    <span id="selectionCount" class="text-sm font-bold text-orange-500">0/8</span>
                </div>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <section class="bg-white rounded-2xl border border-gray-100 card-shadow overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="font-bold text-gray-700"><i class="fas fa-plus-circle mr-2 text-esun-green"></i>手動輸入消費</h2>
                <div class="flex items-center gap-2 text-[10px] text-gray-400">
                    <i class="fas fa-info-circle"></i>
                    部分特店限「實體卡/感應支付」才計入特店加碼
                </div>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">1. 支付方式</label>
                        <select id="payMethod" class="w-full border-gray-200 rounded-xl focus:ring-esun-green focus:border-esun-green py-2.5">
                            <option value="physical">實體卡 / Apple / Google / Samsung Pay</option>
                            <option value="linepay">LINE Pay</option>
                            <option value="jkopay">街口支付</option>
                            <option value="esun_wallet">玉山 Wallet (電子支付)</option>
                            <option value="other">其他 / 延後付款 (不計入行動支付加碼)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">2. 店家/關鍵字</label>
                        <input id="storeName" type="text" placeholder="例: 饗食天堂, 蝦皮, 或是國外城市" class="w-full border-gray-200 rounded-xl focus:ring-esun-green focus:border-esun-green py-2.5">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">3. 金額 (TWD)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                            <input id="amount" type="number" placeholder="金額" class="w-full pl-8 border-gray-200 rounded-xl focus:ring-esun-green focus:border-esun-green py-2.5 font-bold">
                        </div>
                    </div>
                </div>
                <button onclick="addTransaction()" class="w-full bg-esun-green text-white py-3 rounded-xl font-bold hover:opacity-90 transition-opacity">
                    加入計算
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left: History -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h3 class="font-bold text-gray-700 flex items-center"><i class="fas fa-history mr-2 text-esun-green"></i>近期消費 (前 200 筆)</h3>
                    <button onclick="clearAll()" class="text-xs text-red-500 hover:underline">清空所有資料</button>
                </div>
                <div id="historyList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 scrollbar-hide">
                    <!-- History Rendered Here -->
                </div>
            </div>

            <!-- Right: Analysis -->
            <div class="space-y-4">
                <h3 class="font-bold text-gray-700 flex items-center"><i class="fas fa-chart-pie mr-2 text-orange-400"></i>智能「任意選」推薦清單</h3>
                <div class="bg-white rounded-2xl border border-orange-100 card-shadow overflow-hidden">
                    <div id="recommendationList" class="p-4 space-y-3">
                        <!-- Recs Rendered Here -->
                    </div>
                    <div class="bg-orange-50 p-4 border-t border-orange-100 space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-orange-800 font-medium">特店加碼 (3.5%)</span>
                            <span id="specialPoints" class="font-bold text-orange-600">0 pt</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">一般消費 (1% ~ 1.5%)</span>
                            <span id="basicPoints" class="text-gray-600">0 pt</span>
                        </div>
                    </div>
                </div>
                
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h4 class="text-sm font-bold text-blue-700 mb-1"><i class="fas fa-exclamation-triangle mr-1"></i>注意支付限制</h4>
                    <p class="text-[11px] text-blue-600 leading-relaxed">
                        根據最新規範：加油、百貨、餐飲、旅遊等特店若使用 <b>LINE Pay/街口</b> 支付，將會被歸類為「行動支付」類別。若要享有「特定品牌」加碼，請盡量使用 <b>實體卡感應支付</b>。
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-medium opacity-0 pointer-events-none transition-opacity duration-300 z-[100]">
        已成功加入
    </div>

    <script>
        // 最新官方特店清單匹配
        const STORE_CAT_MAPPING = {
            // 行動支付類 (本身就是特店)
            'LINE Pay': '行動支付', '街口支付': '行動支付', '悠遊付': '行動支付', '全支付': '行動支付', '全盈+PAY': '行動支付', 'icash Pay': '行動支付', 'iPASS MONEY': '行動支付',
            // 加油交通
            '中油': '加油交通', '55688': '加油交通', '台灣大車隊': '加油交通', '台鐵': '加油交通', '高鐵': '加油交通', 'Uber': '加油交通', 'Yoxi': '加油交通',
            // 國內百貨
            '新光三越': '國內百貨', '遠東SOGO': '國內百貨', 'Garden City': '國內百貨', '遠東百貨': '國內百貨', '漢神百貨': '國內百貨', '微風百貨': '國內百貨', '台北101': '國內百貨', '華泰名品城': '國內百貨', '三井OUTLET': '國內百貨', '京站': '國內百貨', '美麗華': '國內百貨', '誠品': '國內百貨', '秀泰生活': '國內百貨', 'LaLaport': '國內百貨', '統領廣場': '國內百貨', '統一時代': '國內百貨', '昇恆昌': '國內百貨', '采盟': '國內百貨',
            // 餐飲美食
            'Uber Eats': '餐飲美食', 'foodpanda': '餐飲美食', 'EZTABLE': '餐飲美食', '王品': '餐飲美食', '饗賓': '餐飲美食', '饗食天堂': '餐飲美食', '旭集': '餐飲美食', '饗饗': '餐飲美食', '果然匯': '餐飲美食', '瓦城': '餐飲美食', '非常泰': '餐飲美食', '大心': '餐飲美食', '乾杯': '餐飲美食', '漢來美食': '餐飲美食', '鼎王': '餐飲美食', '爭鮮': '餐飲美食',
            // 航空旅遊
            '中華航空': '航空旅遊', '長榮航空': '航空旅遊', '日本航空': '航空旅遊', '台灣虎航': '航空旅遊', '樂桃航空': '航空旅遊', '酷航': '航空旅遊', 'Trip.com': '航空旅遊', 'Booking.com': '航空旅遊', 'Hotels.com': '航空旅遊', 'AsiaYo': '航空旅遊', 'Expedia': '航空旅遊', 'KKday': '航空旅遊', 'Klook': '航空旅遊', '雄獅旅遊': '航空旅遊', '可樂旅遊': '航空旅遊', '東南旅遊': '航空旅遊', 'Agoda': '航空旅遊',
            // 精選商家
            'Apple直營店': '精選商家', '小米台灣': '精選商家', '全國電子': '精選商家', '燦坤': '精選商家', '迪卡儂': '精選商家',
            // 生活採買
            '家樂福': '生活採買', '屈臣氏': '生活採買', '康是美': '生活採買', '特力屋': '生活採買', 'HOLA': '生活採買', 'UNIQLO': '生活採買', 'NET': '生活採買', '大樹藥局': '生活採買', '丁丁藥妝': '生活採買',
            // 電商平台
            'momo': '電商平台', '蝦皮': '電商平台', '淘寶': '電商平台', 'Coupang': '電商平台', '酷澎': '電商平台',
            // ESG 消費
            '特斯拉': 'ESG消費', 'Tesla': 'ESG消費', 'Gogoro': 'ESG消費', 'YouBike': 'ESG消費', '愛心捐款': 'ESG消費',
            // 國外實體 (關鍵字判斷)
            '日本': '國外實體', '韓國': '國外實體', '泰國': '國外實體', '越南': '國外實體', '新加坡': '國外實體', '馬來西亞': '國外實體', '美國': '國外實體', '香港': '國外實體', '澳門': '國外實體', '英國': '國外實體', '法國': '國外實體', '德國': '國外實體', '義大利': '國外實體'
        };

        let transactions = [];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        // 初始化 200 筆模擬資料
        function initMockData() {
            transactions = [];
            const storePool = Object.keys(STORE_CAT_MAPPING);
            const payMethods = ['physical', 'linepay', 'jkopay', 'esun_wallet'];
            
            for (let i = 0; i < 200; i++) {
                const isSpecial = Math.random() < 0.75;
                let store = isSpecial ? storePool[Math.floor(Math.random() * storePool.length)] : "路邊小吃/雜貨店";
                const amount = Math.floor(Math.random() * 4500) + 100;
                const payMethod = payMethods[Math.floor(Math.random() * payMethods.length)];
                
                // 模擬真實分類邏輯
                let group = "一般消費";
                let matchedGroup = null;
                for (let keyword in STORE_CAT_MAPPING) {
                    if (store.includes(keyword)) {
                        matchedGroup = STORE_CAT_MAPPING[keyword];
                        break;
                    }
                }

                if (matchedGroup) {
                    // 根據注意事項：加油、百貨、餐飲等若用行動支付，則歸類為行動支付
                    const needPhysical = ['加油交通', '國內百貨', '餐飲美食', '航空旅遊', '精選商家', '生活採買', '電商平台', '國外實體', 'ESG消費'];
                    if (needPhysical.includes(matchedGroup) && (payMethod === 'linepay' || payMethod === 'jkopay')) {
                        group = "行動支付";
                    } else {
                        group = matchedGroup;
                    }
                }

                transactions.push({
                    id: Date.now() + i,
                    store: store,
                    group: group,
                    amount: amount,
                    payMethod: payMethod,
                    date: `2024/06/${Math.floor(Math.random() * 25) + 1}`
                });
            }
            updateUI();
            //showToast("200 筆最新特店資料已載入");
        }

        function addTransaction() {
            const storeName = document.getElementById('storeName').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payMethod = document.getElementById('payMethod').value;

            if (!storeName || isNaN(amount)) return;

            let group = "一般消費";
            let matchedGroup = null;
            for (let keyword in STORE_CAT_MAPPING) {
                if (storeName.includes(keyword)) {
                    matchedGroup = STORE_CAT_MAPPING[keyword];
                    break;
                }
            }

            if (matchedGroup) {
                const needPhysical = ['加油交通', '國內百貨', '餐飲美食', '航空旅遊', '精選商家', '生活採買', '電商平台', '國外實體', 'ESG消費'];
                if (needPhysical.includes(matchedGroup) && (payMethod === 'linepay' || payMethod === 'jkopay')) {
                    group = "行動支付";
                } else {
                    group = matchedGroup;
                }
            }

            transactions.push({
                id: Date.now(),
                store: storeName,
                group: group,
                amount: amount,
                payMethod: payMethod,
                date: new Date().toLocaleDateString('zh-TW')
            });

            updateUI();
            document.getElementById('storeName').value = '';
            document.getElementById('amount').value = '';
            showToast("已手動新增紀錄");
        }

        function deleteTx(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        }

        function clearAll() {
            if(confirm("確定要清空所有紀錄？")) {
                transactions = [];
                updateUI();
            }
        }

        function updateUI() {
            const historyList = document.getElementById('historyList');
            const recList = document.getElementById('recommendationList');
            
            const totalSpend = transactions.reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('totalSpend').innerText = `$${totalSpend.toLocaleString()}`;

            // 計算各組金額
            const groupStats = {};
            transactions.forEach(t => {
                if (t.group !== "一般消費") {
                    groupStats[t.group] = (groupStats[t.group] || 0) + t.amount;
                }
            });

            const sortedGroups = Object.entries(groupStats).sort((a, b) => b[1] - a[1]);
            const top8 = sortedGroups.slice(0, 8);
            const top8Names = top8.map(g => g[0]);
            
            let specPts = 0;
            let basicPts = 0;
            
            transactions.forEach(t => {
                if (top8Names.includes(t.group)) {
                    specPts += t.amount * 0.035;
                } else {
                    // 國外實體(若沒選入Top8)與一般海外給 1.5%，國內 1%
                    const isOversea = t.group === '國外實體' || t.store.includes('日本') || t.store.includes('韓國');
                    basicPts += t.amount * (isOversea ? 0.015 : 0.01);
                }
            });

            document.getElementById('totalPoints').innerText = Math.floor(specPts + basicPts).toLocaleString();
            document.getElementById('specialPoints').innerText = `${Math.floor(specPts).toLocaleString()} pt`;
            document.getElementById('basicPoints').innerText = `${Math.floor(basicPts).toLocaleString()} pt`;
            
            document.getElementById('selectionCount').innerText = `${top8.length}/8`;
            document.getElementById('selectionProgress').style.width = `${(top8.length/8)*100}%`;

            // 列表渲染
            if (transactions.length === 0) {
                historyList.innerHTML = `<div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-10 text-center text-gray-400">尚無紀錄</div>`;
            } else {
                historyList.innerHTML = transactions.slice().sort((a,b) => b.id - a.id).slice(0, 100).map(t => `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center transition-all hover:border-esun-green/30">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full ${top8Names.includes(t.group) ? 'bg-orange-50 text-orange-500' : 'bg-gray-50 text-gray-400'} flex items-center justify-center font-bold text-xs">
                                ${t.group.substring(0,2)}
                            </div>
                            <div>
                                <p class="font-bold text-gray-800 text-sm">${t.store}</p>
                                <p class="text-[10px] text-gray-400">${t.group} · ${t.payMethod === 'physical' ? '實體卡' : t.payMethod} · ${t.date}</p>
                            </div>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <div>
                                <p class="font-bold text-gray-800 text-sm">$${t.amount.toLocaleString()}</p>
                                <p class="text-[10px] ${top8Names.includes(t.group) ? 'text-orange-500 font-bold' : 'text-gray-400'}">
                                    ${top8Names.includes(t.group) ? '加碼 3.5%' : '基本回饋'}
                                </p>
                            </div>
                            <button onclick="deleteTx(${t.id})" class="text-gray-200 hover:text-red-400">
                                <i class="fas fa-times-circle"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            // 推薦清單渲染
            recList.innerHTML = top8.length === 0 ? `<p class="text-sm text-gray-400 text-center py-4">無特店資料</p>` : 
                top8.map(([name, amount], idx) => `
                    <div class="flex items-center justify-between p-2.5 rounded-xl bg-orange-50/50 border border-orange-100/50">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold w-5 h-5 bg-orange-400 text-white rounded flex items-center justify-center">${idx+1}</span>
                            <span class="text-sm font-bold text-gray-700">${name}</span>
                        </div>
                        <span class="text-xs font-bold text-orange-600">$${Math.floor(amount).toLocaleString()}</span>
                    </div>
                `).join('');
        }

        window.onload = initMockData;
    </script>
</body>
</html>
